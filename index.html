<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Artillery Strike - Ko9 Games</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Russo+One&display=swap');

:root {
  --olive: #4a5a2a;
  --dark-olive: #2e3a18;
  --khaki: #8b9d5a;
  --sand: #c8b97a;
  --rust: #c0392b;
  --steel: #7f8c8d;
  --hud-bg: rgba(10,15,5,0.92);
  --amber: #f0a800;
  --green-glow: #7fff00;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--dark-olive);
  font-family: 'Share Tech Mono', monospace;
  color: var(--sand);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
#gameCanvas { touch-action: none; }

#gameWrapper {
  display: flex; flex-direction: column;
  height: 100dvh; max-width: 900px; margin: 0 auto;
}

#hud {
  display: flex; justify-content: space-between; align-items: stretch;
  background: var(--hud-bg); border-bottom: 2px solid var(--olive);
  padding: 5px 8px; gap: 6px; flex-shrink: 0;
}
.player-panel {
  background: rgba(0,0,0,0.4); border: 1px solid var(--olive);
  padding: 5px 8px; min-width: 125px;
}
.player-panel.active { border-color: var(--amber); box-shadow: 0 0 8px rgba(240,168,0,0.35); }
.player-panel h3 {
  font-family: 'Russo One', sans-serif; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px;
}
.p1-label { color: #5bc0eb; } .p2-label { color: #fa7921; }
.stat-row { display:flex; justify-content:space-between; font-size:10px; margin:1px 0; }
.stat-val { color: var(--green-glow); font-weight:bold; }
.health-bar-bg { background:#1a1a1a; height:6px; border:1px solid #333; margin-top:3px; }
.health-bar { height:100%; transition:width 0.3s; }
.p1-health { background: linear-gradient(90deg,#5bc0eb,#0077b6); }
.p2-health { background: linear-gradient(90deg,#fa7921,#c0392b); }

#centerHud {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
}
#turnLabel {
  font-family:'Russo One',sans-serif; font-size:11px;
  letter-spacing:3px; color:var(--amber); text-transform:uppercase;
}
#aiStatus { font-size:9px; color:#fa7921; letter-spacing:2px; height:12px; }
#diffRow { display:flex; gap:3px; }
.diff-btn {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  padding:2px 6px; border:1px solid var(--olive);
  background:transparent; color:var(--khaki); cursor:pointer; letter-spacing:1px;
}
.diff-btn.active { background:var(--olive); color:var(--amber); border-color:var(--amber); }

#gameCanvas { flex:1; display:block; touch-action:none; }

#controlsArea {
  background: var(--hud-bg);
  border-top: 2px solid var(--olive);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
#actionRow {
  display: flex; align-items: center;
  gap: 4px; padding: 5px 6px 4px;
  border-bottom: 1px solid var(--olive);
}
#weaponRow {
  display: flex; align-items: center;
  gap: 4px; padding: 4px 6px 5px;
  overflow-x: auto; scrollbar-width: none;
}
#weaponRow::-webkit-scrollbar { display: none; }
#turnTimerBar {
  height: 4px; width: 100%; background: rgba(0,0,0,0.4);
  position: relative; overflow: hidden;
}
#turnTimerFill {
  height: 100%; width: 100%;
  background: var(--green-glow);
  transform-origin: left;
  transition: background 0.3s;
}

.move-btn {
  flex-shrink:0; background:var(--olive); border:1px solid var(--khaki);
  color:var(--sand); font-family:'Share Tech Mono',monospace;
  font-size:15px; width:38px; height:38px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: all 0.1s;
}
.move-btn:active { background:var(--khaki); color:#000; }

#sep { width:1px; background:var(--olive); align-self:stretch; margin:0 3px; flex-shrink:0; }

.wbtn {
  flex-shrink:0; display:flex; flex-direction:column; align-items:center;
  background:rgba(0,0,0,0.45); border:1px solid var(--olive);
  padding:4px 8px; cursor:pointer; min-width:50px;
  transition:all 0.12s;
}
.wbtn:active { border-color:var(--amber); }
.wbtn.sel { border-color:var(--amber); background:rgba(240,168,0,0.15); }
.wbtn .wi { font-size:18px; line-height:1; }
.wbtn .wn { font-size:7px; letter-spacing:.5px; color:var(--sand); margin-top:2px; text-align:center; }

#powerBtn {
  flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.5); border:2px solid var(--olive);
  padding:4px 10px; cursor:pointer; min-width:64px; gap:2px;
  transition: border-color 0.1s, background 0.1s;
  touch-action: none; user-select:none;
}
#powerBtn:active, #powerBtn.charging { border-color:var(--amber); background:rgba(240,168,0,0.12); }
#powerBtnVal {
  font-family:'Russo One',sans-serif; font-size:18px; line-height:1;
  color:var(--amber);
}
#powerBtnBar {
  width:52px; height:6px;
  background:rgba(0,0,0,0.6); border:1px solid #555; border-radius:1px; overflow:hidden;
}
#powerBtnFill {
  height:100%; width:50%;
  background: linear-gradient(90deg,#7fff00 0%,#f0a800 60%,#e74c3c 100%);
}
#powerBtnLabel {
  font-size:7px; letter-spacing:1px; color:var(--khaki);
  font-family:'Share Tech Mono',monospace;
}
#fireBtn {
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg,#8a1a0a,#c0392b);
  border:2px solid #e74c3c; color:#fff;
  font-family:'Russo One',sans-serif; font-size:13px; letter-spacing:2px;
  padding:0 16px; height:48px; cursor:pointer; min-width:70px;
  transition: all 0.1s;
}
#fireBtn:active { background: linear-gradient(135deg,#c0392b,#e74c3c); transform:scale(0.96); }

#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:10; font-family:'Russo One',sans-serif;
}
#overlay h1 {
  font-size:42px; letter-spacing:8px; color:var(--amber);
  text-shadow:0 0 20px rgba(240,168,0,0.5); margin-bottom:6px;
}
#overlay .subtitle {
  font-family:'Share Tech Mono',monospace; font-size:11px;
  color:var(--khaki); letter-spacing:3px; margin-bottom:30px;
}
#overlay .big-btn {
  background:var(--olive); border:2px solid var(--amber); color:var(--amber);
  font-family:'Russo One',sans-serif; font-size:16px; letter-spacing:4px;
  padding:12px 44px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s; margin:5px;
}
#overlay .big-btn:hover { background:var(--amber); color:#000; }
#winText {
  font-size:24px; letter-spacing:4px; color:var(--green-glow);
  margin-bottom:16px; text-shadow:0 0 15px rgba(127,255,0,0.5);
}
.key-hint {
  font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--steel);
  margin-top:20px; letter-spacing:2px; text-align:center; line-height:2;
}
.key-hint span { color:var(--sand); }
</style>

</head>
<body>

<div id="overlay">
  <h1>ARTILLERY STRIKE</h1>
  <div class="subtitle">// KO9 GAMES // MISSILE WARFARE //</div>
  <div id="winText" style="display:none"></div>
  <button class="big-btn" onclick="startGame()">DEPLOY</button>
  <div class="key-hint">
    <span>◀▶ swipe canvas</span> — aim barrel<br>
    <span>hold POWER btn</span> — charge power (oscillates 0→100)<br>
    <span>tap FIRE btn</span> — shoot with current power<br>
    <span>tap ◀ ▶</span> — move &nbsp; <span>A/D W/S Q/E SPACE</span> — keyboard
  </div>
</div>

<div id="gameWrapper">
  <div id="hud">
    <div class="player-panel" id="panel1">
      <h3 class="p1-label">◀ Player 1</h3>
      <div class="stat-row"><span>HP</span><span class="stat-val" id="hp1">100</span></div>
      <div class="stat-row"><span>ANG</span><span class="stat-val" id="ang1">55°</span></div>
      <div class="health-bar-bg"><div class="health-bar p1-health" id="hbar1" style="width:100%"></div></div>
    </div>
    <div id="centerHud">
      <div id="turnLabel">PLAYER 1 TURN</div>
      <div id="aiStatus"></div>
      <div id="diffRow">
        <button class="diff-btn active" onclick="setDiff('easy')">EASY</button>
        <button class="diff-btn" onclick="setDiff('medium')">MED</button>
        <button class="diff-btn" onclick="setDiff('hard')">HARD</button>
      </div>
    </div>
    <div class="player-panel" id="panel2">
      <h3 class="p2-label">CPU ▶ 🤖</h3>
      <div class="stat-row"><span>HP</span><span class="stat-val" id="hp2">100</span></div>
      <div class="stat-row"><span>ANG</span><span class="stat-val" id="ang2">125°</span></div>
      <div class="health-bar-bg"><div class="health-bar p2-health" id="hbar2" style="width:100%"></div></div>
    </div>
  </div>

<canvas id="gameCanvas"></canvas>

  <div id="controlsArea">
    <div id="turnTimerBar"><div id="turnTimerFill"></div></div>
    <div id="actionRow">
      <button class="move-btn" id="btnLeft">◀</button>
      <button class="move-btn" id="btnRight">▶</button>
      <div id="sep" style="width:1px;background:var(--olive);align-self:stretch;margin:0 3px;flex-shrink:0;"></div>
      <div id="powerBtn">
        <div id="powerBtnVal">50</div>
        <div id="powerBtnBar"><div id="powerBtnFill" style="width:50%"></div></div>
        <div id="powerBtnLabel">HOLD·PWR</div>
      </div>
      <button id="fireBtn">FIRE ◆</button>
    </div>
    <div id="weaponRow">
      </div>
  </div>
</div>

<script>
// POLYFILL for roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (typeof r === 'undefined') r = 0;
    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
    else {
      var defaultRadius = {tl: 0, tr: 0, br: 0, bl: 0};
      for (var side in defaultRadius) r[side] = r[side] || defaultRadius[side];
    }
    this.beginPath();
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
    return this;
  };
}

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ── Weapons ───────────────────────────────────────────────────────────────────
const WEAPONS = [
  { id:'light',   name:'LIGHT',    icon:'🚀', damage:15, radius:22, gravity:1.0, color:'#f0c840', bounces:0, mSize:1, trailCol:'rgba(240,200,60,0.5)'  },
  { id:'medium',  name:'MEDIUM',   icon:'🚀', damage:25, radius:35, gravity:0.9, color:'#f08020', bounces:0, mSize:2, trailCol:'rgba(240,128,32,0.5)'  },
  { id:'heavy',   name:'HEAVY',    icon:'🚀', damage:38, radius:50, gravity:0.8, color:'#e04020', bounces:0, mSize:3, trailCol:'rgba(224,64,32,0.55)'  },
  { id:'cluster', name:'CLUSTER',  icon:'💥', damage:12, radius:20, gravity:1.0, color:'#e06020', bounces:0, mSize:2, trailCol:'rgba(224,96,32,0.4)'   },
  { id:'bunker',  name:'BUNKER',   icon:'🔩', damage:30, radius:18, gravity:1.2, color:'#8080c0', bounces:2, mSize:2, trailCol:'rgba(128,128,192,0.4)' },
  { id:'cruise',  name:'CRUISE',   icon:'✈️', damage:28, radius:32, gravity:0.0, color:'#40c0ff', bounces:0, mSize:2, trailCol:'rgba(64,192,255,0.45)' },
  { id:'thermo',  name:'THERMO',   icon:'☢️', damage:55, radius:85, gravity:0.7, color:'#80ff40', bounces:0, mSize:4, trailCol:'rgba(128,255,64,0.5)'  },
  { id:'multi',   name:'MULTI',    icon:'🎯', damage:18, radius:28, gravity:0.9, color:'#ff8040', bounces:0, mSize:2, trailCol:'rgba(255,128,64,0.45)', multi:3 },
];

// Build weapon buttons
const weaponBar = document.getElementById('weaponRow');
WEAPONS.forEach((w, i) => {
  const b = document.createElement('button');
  b.className = 'wbtn' + (i===0?' sel':'');
  const dots = '●'.repeat(w.mSize||2) + '○'.repeat(4-(w.mSize||2));
  b.innerHTML = `<div class="wi" style="font-size:14px">${w.icon}</div><div class="wn">${w.name}</div><div style="font-size:7px;color:${w.color};letter-spacing:1px">${dots}</div>`;
  b.addEventListener('touchstart', e => { e.preventDefault(); }, {passive:false});
  b.addEventListener('touchend', e => { e.preventDefault(); selectWeapon(i); }, {passive:false});
  b.addEventListener('mousedown', () => selectWeapon(i));
  weaponBar.appendChild(b);
});

function selectWeapon(i) {
  if (animating || currentPlayer !== 0) return;
  tanks[0].weapon = WEAPONS[i];
  document.querySelectorAll('.wbtn').forEach((b,j) => b.classList.toggle('sel', j===i));
}

// ── Game state ────────────────────────────────────────────────────────────────
let W, H;
let terrain, mudStrata;
let tanks, currentPlayer;
let projectiles, explosions, particles, dmgTexts;
let gameRunning, animating, wind;
let aiTurnId = 0; 

const TURN_WARN_MS   = 5000;
const TURN_EXPIRE_MS = 8000;
let turnStartTime    = null;
let turnTimerRaf     = null;
let turnTimerId      = 0;

let touchStartX    = null;
let touchStartY    = null;
let swipeBaseAngle = null;
let swipeLocked    = false;
const SWIPE_LOCK_PX = 7;

let powerCharging  = false;
let powerStartTime = null;
let powerRaf       = null;
let holdPower      = 50; 
const HOLD_CYCLE   = 2200;

function initCanvas() {
  const wr  = document.getElementById('gameWrapper');
  const hud = document.getElementById('hud');
  const bar = document.getElementById('controlsArea');
  W = canvas.width  = wr.clientWidth;
  H = canvas.height = wr.clientHeight - hud.offsetHeight - bar.offsetHeight;
}

function noiseFn(x, freq, seed) {
  return Math.sin(x*freq + seed)*0.50
       + Math.sin(x*freq*1.73 + seed*2.1)*0.30
       + Math.sin(x*freq*3.07 + seed*0.77)*0.20;
}

function generateTerrain() {
  terrain  = new Float32Array(W);
  mudStrata = [];
  const seeds = [Math.random()*100, Math.random()*100, Math.random()*100, Math.random()*100];
  const octaves = [
    { amp: H*0.20, freq: 2.2 },
    { amp: H*0.09, freq: 5.1 },
    { amp: H*0.04, freq: 11.0 },
    { amp: H*0.015,freq: 22.0 },
  ];
  for (let x = 0; x < W; x++) {
    const nx = x / W;
    let h = H * 0.50;
    octaves.forEach((o,i) => h += noiseFn(nx, o.freq, seeds[i]) * o.amp);
    terrain[x] = Math.max(H*0.22, Math.min(H*0.78, h));
  }
  const stratumSeed = Math.random()*50;
  for (let x = 0; x < W; x++) {
    const boundaries = [];
    let y = terrain[x];
    const thicknesses = [
      9  + Math.sin(x*0.04  + stratumSeed)*3,
      14 + Math.sin(x*0.025 + stratumSeed*1.3)*5,
      18 + Math.sin(x*0.018 + stratumSeed*0.7)*6,
      22 + Math.sin(x*0.012 + stratumSeed*2.1)*7,
      28 + Math.sin(x*0.009 + stratumSeed*0.4)*9,
      H,
    ];
    for (const t of thicknesses) {
      boundaries.push(y);
      y += t;
    }
    mudStrata[x] = boundaries;
  }
}

function terrainY(x) {
  const xi = Math.max(0, Math.min(W-1, Math.floor(x)));
  return terrain[xi];
}

function flattenArea(cx, r) {
  const cy = terrainY(cx);
  for (let x = cx-r; x <= cx+r; x++) {
    const xi = Math.floor(x);
    if (xi<0||xi>=W) continue;
    const t = Math.abs(x-cx)/r;
    terrain[xi] = cy*(1-t*t) + terrain[xi]*(t*t);
  }
}

function deformCrater(cx, cy, r) {
  for (let x = Math.floor(cx-r); x <= Math.ceil(cx+r); x++) {
    const xi = Math.max(0, Math.min(W-1, x));
    const dx = xi - cx;
    if (Math.abs(dx) > r) continue;
    const ratio = Math.sqrt(Math.max(0, 1 - (dx*dx)/(r*r)));
    const depth  = ratio * r * 0.50;
    const oldY   = terrain[xi];
    terrain[xi]  = Math.min(H*0.87, oldY + depth);
    const shift  = terrain[xi] - oldY;
    if (mudStrata[xi]) {
      mudStrata[xi] = mudStrata[xi].map((sy, si) => {
        const layerFactor = Math.max(0, 1 - si*0.15); 
        return sy + shift * layerFactor;
      });
    }
  }
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initCanvas();
  generateTerrain();
  wind = (Math.random()-0.5)*0.38;
  const p1x = W*0.14, p2x = W*0.86;
  tanks = [
    { x:p1x, angle:55,  power:50, hp:100, maxHp:100, color:'#5bc0eb', wheelColor:'#2070a0', weapon:WEAPONS[0] },
    { x:p2x, angle:125, power:50, hp:100, maxHp:100, color:'#fa7921', wheelColor:'#9a2010', weapon:WEAPONS[0] },
  ];
  flattenArea(p1x, 30);
  flattenArea(p2x, 30);
  tanks.forEach(t => t.y = terrainY(t.x));
  projectiles=[]; explosions=[]; particles=[]; dmgTexts=[];
  currentPlayer=0; gameRunning=true; animating=false;
  aiTurnId++; holdPower=50; updatePowerBtn();
  document.querySelectorAll('.wbtn').forEach((b,i)=>b.classList.toggle('sel',i===0));
  tanks[0].weapon=WEAPONS[0];
  updateHUD();
  requestAnimationFrame(loop);
  setTimerBarVisible(false);
  setTimeout(startTurnTimer, 200);
}

function updateHUD() {
  document.getElementById('turnLabel').textContent = currentPlayer===0 ? 'PLAYER 1 TURN' : 'CPU TURN 🤖';
  document.getElementById('panel1').classList.toggle('active', currentPlayer===0);
  document.getElementById('panel2').classList.toggle('active', currentPlayer===1);
  document.getElementById('hp1').textContent = tanks[0].hp;
  document.getElementById('hp2').textContent = tanks[1].hp;
  document.getElementById('hbar1').style.width = (tanks[0].hp/tanks[0].maxHp*100)+'%';
  document.getElementById('hbar2').style.width = (tanks[1].hp/tanks[1].maxHp*100)+'%';
  document.getElementById('ang1').textContent = Math.round(tanks[0].angle)+'°';
  document.getElementById('ang2').textContent = Math.round(tanks[1].angle)+'°';
}

let swipeTouchId = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameRunning || animating || currentPlayer!==0) return;
  if (swipeTouchId !== null) return;
  if (powerCharging) return;
  const t = e.changedTouches[0];
  swipeTouchId   = t.identifier;
  touchStartX    = t.clientX;
  touchStartY    = t.clientY;
  swipeBaseAngle = tanks[0].angle;
  swipeLocked    = false;
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (swipeTouchId === null) return;
  let t = null;
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === swipeTouchId) { t = e.changedTouches[i]; break; }
  }
  if (!t) return;
  if (!gameRunning || animating || currentPlayer!==0) return;
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (!swipeLocked && (Math.abs(dx)>=SWIPE_LOCK_PX || Math.abs(dy)>=SWIPE_LOCK_PX)) swipeLocked=true;
  if (swipeLocked) { tanks[0].angle = Math.max(1, Math.min(179, swipeBaseAngle - dx*0.22)); updateHUD(); }
}, {passive: false});

function clearSwipe() {
  swipeTouchId = null; touchStartX = null; touchStartY = null; swipeLocked = false;
}
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === swipeTouchId) { clearSwipe(); break; }
  }
}, {passive:false});
canvas.addEventListener('touchcancel', e => { e.preventDefault(); clearSwipe(); }, {passive:false});

const powerBtn = document.getElementById('powerBtn');
powerBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  clearSwipe();
  if (!gameRunning || animating || currentPlayer!==0) return;
  powerCharging=true; powerStartTime=Date.now();
  powerBtn.classList.add('charging');
  tickPower();
}, {passive:false});
powerBtn.addEventListener('touchend',    e => { e.preventDefault(); stopPower(); }, {passive:false});
powerBtn.addEventListener('touchcancel', e => { e.preventDefault(); stopPower(); }, {passive:false});
powerBtn.addEventListener('mousedown', e => {
  if (!gameRunning || animating || currentPlayer!==0) return;
  powerCharging=true; powerStartTime=Date.now();
  powerBtn.classList.add('charging');
  tickPower();
});
window.addEventListener('mouseup', () => stopPower());

function stopPower() {
  if (!powerCharging) return;
  powerCharging=false;
  cancelAnimationFrame(powerRaf); powerRaf=null;
  document.getElementById('powerBtn').classList.remove('charging');
  tanks[0].power = holdPower;
}

function tickPower() {
  if (!powerCharging) return;
  const elapsed = Date.now() - powerStartTime;
  holdPower = Math.min(100, Math.round((elapsed / HOLD_CYCLE) * 100));
  holdPower = Math.max(1, holdPower);
  updatePowerBtn();
  if (holdPower < 100) powerRaf = requestAnimationFrame(tickPower);
}

function updatePowerBtn() {
  document.getElementById('powerBtnVal').textContent  = holdPower;
  document.getElementById('powerBtnFill').style.width = holdPower + '%';
}

const fireBtn = document.getElementById('fireBtn');
let fireBtnTouched = false;
fireBtn.addEventListener('touchstart', e => { e.preventDefault(); fireBtnTouched = true; }, {passive:false});
fireBtn.addEventListener('touchend', e => {
  e.preventDefault(); fireBtnTouched = false;
  if (!gameRunning || animating || currentPlayer!==0) return;
  tanks[0].power = holdPower; fire();
}, {passive:false});
fireBtn.addEventListener('mousedown', e => {
  if (fireBtnTouched) return;
  if (!gameRunning || animating || currentPlayer!==0) return;
  tanks[0].power = holdPower; fire();
});

function wireMoveBtn(id, dir) {
  const btn = document.getElementById(id);
  let touched = false;
  btn.addEventListener('touchstart', e => { e.preventDefault(); touched = true; }, {passive:false});
  btn.addEventListener('touchend', e => { e.preventDefault(); touched = false; if (!gameRunning||animating||currentPlayer!==0) return; moveTank(0, dir); }, {passive:false});
  btn.addEventListener('mousedown', () => { if (touched) return; if (!gameRunning||animating||currentPlayer!==0) return; moveTank(0, dir); });
}
wireMoveBtn('btnLeft',  -1);
wireMoveBtn('btnRight',  1);

function moveTank(idx, dir) {
  if (!gameRunning || animating) return;
  const t = tanks[idx];
  t.x = Math.max(20, Math.min(W-20, t.x + dir*9));
  t.y = terrainY(t.x);
}

document.addEventListener('keydown', e => {
  if (!gameRunning || animating || currentPlayer!==0) return;
  const t = tanks[0];
  if (e.code==='KeyA') moveTank(0,-1);
  if (e.code==='KeyD') moveTank(0,1);
  if (e.code==='KeyW') { t.angle=Math.max(1,t.angle-3); updateHUD(); }
  if (e.code==='KeyS') { t.angle=Math.min(179,t.angle+3); updateHUD(); }
  if (e.code==='KeyQ') { holdPower=Math.max(1,holdPower-5); t.power=holdPower; updatePowerBtn(); }
  if (e.code==='KeyE') { holdPower=Math.min(100,holdPower+5); t.power=holdPower; updatePowerBtn(); }
  if (e.code==='Space') { e.preventDefault(); tanks[0].power=holdPower; fire(); }
});

function fire() {
  if (!gameRunning || animating) return;
  stopTurnTimer();
  aimCache.dots = [];
  const t   = tanks[currentPlayer];
  const rad = (t.angle * Math.PI) / 180;
  const spd = t.power * 0.22;
  const RAIL_LEN = 28, RAIL_Y = -18;
  const bx = Math.cos(rad) * RAIL_LEN;
  const by = -Math.sin(rad) * RAIL_LEN;
  const startX = t.x + bx;
  const startY = t.y + RAIL_Y + by;
  if (t.weapon.multi) {
    const spread = [-8, 0, 8];
    spread.forEach((offset, si) => {
      setTimeout(() => {
        if (!gameRunning) return;
        const offRad = rad + offset * 0.018;
        const svx = Math.cos(offRad)*spd + offset*0.04;
        const svy = -Math.sin(offRad)*spd;
        spawnProjectile(startX, startY, svx, svy, t.weapon, 0);
      }, si * 120);
    });
  } else {
    spawnProjectile(startX, startY, Math.cos(rad)*spd, -Math.sin(rad)*spd, t.weapon, 0);
  }
  playShoot(t.power);
  animating = true;
}

function spawnProjectile(x, y, vx, vy, weapon, bounces) {
  projectiles.push({ x, y, vx, vy, weapon, bounces, trail:[] });
}

function updateProjectiles() {
  for (let i = projectiles.length-1; i>=0; i--) {
    const p = projectiles[i];
    p.trail.push({x:p.x,y:p.y});
    if (p.trail.length>20) p.trail.shift();
    p.vx += wind;
    p.vy += p.weapon.gravity * 0.25;
    p.x  += p.vx; p.y  += p.vy;
    if (p.x<-60||p.x>W+60||p.y>H+60) { projectiles.splice(i,1); continue; }
    if (p.y >= terrainY(p.x)) {
      if (p.weapon.bounces>0 && p.bounces<p.weapon.bounces) {
        p.vy = -Math.abs(p.vy)*0.62; p.vx *= 0.84; p.bounces++; p.y = terrainY(p.x)-1; playBounce();
      } else {
        explode(p); projectiles.splice(i,1);
      }
    }
  }
  if (projectiles.length===0 && animating) setTimeout(endTurn, 700);
}

function explode(p) {
  const w = p.weapon;
  if (w.id==='cluster') {
    for (let i=0;i<6;i++) {
      const ang=(Math.random()-0.5)*Math.PI*1.4;
      const spd=2.5+Math.random()*3.5;
      spawnProjectile(p.x,p.y-5,Math.cos(ang)*spd,-Math.abs(Math.sin(ang))*spd-1.5,
        {...w,id:'light',bounces:0,damage:12,radius:22,gravity:1,mSize:1,trailCol:'rgba(240,160,40,0.4)'},0);
    }
    return;
  }
  deformCrater(p.x, p.y, w.radius);
  playExplosion(w.radius);
  tanks.forEach((t,idx) => {
    const dx=t.x-p.x, dy=t.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if (dist < w.radius+22) {
      const dmg=Math.round(w.damage*(1-dist/(w.radius+22)));
      t.hp=Math.max(0,t.hp-dmg); t.y=terrainY(t.x);
      if(dmg>0) playHit();
      dmgTexts.push({x:t.x,y:t.y-42,dmg,color:idx===0?'#5bc0eb':'#fa7921',life:1});
    }
  });
  explosions.push({x:p.x,y:p.y,r:0,maxR:w.radius*1.6,color:w.color,life:1});
  const mudColors=['#5a3d22','#6b4c30','#7a5a3a','#8c6a45','#3d2b1a','#4a3020'];
  for (let i=0;i<44;i++) {
    const ang=Math.random()*Math.PI*2; const spd=1+Math.random()*6;
    particles.push({x:p.x,y:p.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,life:1, color:mudColors[Math.floor(Math.random()*mudColors.length)],size:3+Math.random()*4, mud:true});
  }
}

function startTurnTimer() {
  stopTurnTimer();
  if (currentPlayer !== 0) { setTimerBarVisible(false); return; }
  setTimerBarVisible(true);
  const myId = ++turnTimerId;
  turnStartTime = Date.now();
  function tick() {
    if (myId !== turnTimerId) return;
    if (!gameRunning) return;
    if (animating || currentPlayer !== 0) { setTimerBarVisible(false); return; }
    const elapsed = Date.now() - turnStartTime;
    const fill = document.getElementById('turnTimerFill');
    if (!fill) return;
    fill.style.width = Math.max(0, (1 - elapsed / TURN_EXPIRE_MS) * 100) + '%';
    if (elapsed < TURN_WARN_MS) fill.style.background = 'var(--green-glow)';
    else if (elapsed < TURN_EXPIRE_MS) fill.style.background = elapsed % 600 < 300 ? '#f0a800' : '#e74c3c';
    else { fill.style.width = '0%'; stopTurnTimer(); animating = true; projectiles = []; setTimeout(endTurn, 400); return; }
    turnTimerRaf = requestAnimationFrame(tick);
  }
  turnTimerRaf = requestAnimationFrame(tick);
}

function stopTurnTimer() { cancelAnimationFrame(turnTimerRaf); turnTimerRaf = null; turnTimerId++; }
function setTimerBarVisible(visible) { const bar = document.getElementById('turnTimerBar'); if (bar) bar.style.opacity = visible ? '1' : '0'; }

function endTurn() {
  tanks.forEach(t => t.y=terrainY(t.x));
  if (tanks[0].hp<=0||tanks[1].hp<=0) {
    const winner=tanks[0].hp>0?'PLAYER 1':'CPU';
    gameRunning=false; const ov=document.getElementById('overlay'); const wt=document.getElementById('winText');
    wt.style.display='block'; wt.textContent=`${winner} VICTORIOUS`;
    ov.querySelector('.big-btn').textContent='REMATCH'; ov.style.display='flex';
    playWin(); return;
  }
  currentPlayer=1-currentPlayer;
  animating=false; wind=(Math.random()-0.5)*0.38; aimCache.angle = null; updateHUD();
  if (currentPlayer===1) { stopTurnTimer(); setTimerBarVisible(false); setTimeout(doAITurn, 600); }
  else { setTimeout(startTurnTimer, 200); }
}

const DIFFICULTY = { easy: {noise:18, moveChance:0.20}, medium: {noise:7,  moveChance:0.35}, hard: {noise:2,  moveChance:0.50} };
let aiDiff = 'easy';
function setDiff(d) {
  aiDiff=d;
  document.querySelectorAll('.diff-btn').forEach(b=> b.classList.toggle('active',b.textContent.toLowerCase().startsWith(d.slice(0,3))));
}

function simShot(ox,oy,vx,vy,grav) {
  let x=ox,y=oy,pvx=vx,pvy=vy;
  for(let s=0;s<3000;s++){
    pvx+=wind; pvy+=grav*0.25; x+=pvx; y+=pvy;
    if(x<0||x>W||y>H+50) return null;
    if(y>=terrainY(x)) return x;
  }
  return null;
}

function doAITurn() {
  const myTurnId = ++aiTurnId;
  const ai=tanks[1], tgt=tanks[0], diff=DIFFICULTY[aiDiff];
  setAISt('ANALYZING...');
  setTimeout(()=>{
    if (myTurnId !== aiTurnId || currentPlayer !== 1 || !gameRunning) return;
    if(Math.random()<diff.moveChance){
      const dir=Math.random()<0.5?-1:1;
      for(let i=0;i<4;i++) ai.x=Math.max(W*0.52,Math.min(W-20,ai.x+dir*9));
      ai.y=terrainY(ai.x);
    }
    // FIX: AI uses weapons that actually exist
    if(tgt.hp<30 && Math.random()<0.5) ai.weapon = WEAPONS.find(w=>w.id==='heavy');
    else if(Math.random()<0.25) ai.weapon = WEAPONS[Math.floor(Math.random()*WEAPONS.length)];
    else ai.weapon = WEAPONS[0];

    setAISt('TARGETING...');
    setTimeout(()=>{
      if (myTurnId !== aiTurnId || currentPlayer !== 1 || !gameRunning) return;
      let bestA=125,bestP=50,bestD=Infinity;
      for(let a=91;a<=179;a+=2){
        for(let p=20;p<=100;p+=5){
          const rad=(a*Math.PI)/180, spd=p*0.22;
          const land=simShot(ai.x,ai.y-20,Math.cos(rad)*spd,-Math.sin(rad)*spd,ai.weapon.gravity);
          if(land===null) continue;
          const d=Math.abs(land-tgt.x);
          if(d<bestD){bestD=d;bestA=a;bestP=p;}
        }
      }
      const n=diff.noise;
      ai.angle=Math.max(91,Math.min(179,bestA+(Math.random()-0.5)*n));
      ai.power=Math.max(10,Math.min(100,bestP+(Math.random()-0.5)*n*0.8));
      updateHUD(); setAISt('FIRING!');
      setTimeout(()=>{ if (myTurnId !== aiTurnId || currentPlayer !== 1 || !gameRunning) return; setAISt(''); fire(); },400);
    },600);
  },700);
}
function setAISt(m){ document.getElementById('aiStatus').textContent=m?`🤖 ${m}`:''; }

let audioCtx = null;
function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
function playShoot(power) {
  const ac=getAudioCtx(); const t=ac.currentTime;
  const osc=ac.createOscillator(); const env=ac.createGain();
  osc.type='sawtooth'; osc.frequency.setValueAtTime(120+power*1.2, t); osc.frequency.exponentialRampToValueAtTime(40, t+0.32);
  env.gain.setValueAtTime(0, t); env.gain.linearRampToValueAtTime(0.5, t+0.02); env.gain.exponentialRampToValueAtTime(0.001, t+0.32);
  osc.connect(env); env.connect(ac.destination); osc.start(t); osc.stop(t+0.32);
}
function playExplosion(radius) {
  const ac=getAudioCtx(); const t=ac.currentTime; const big=radius/80;
  const sub=ac.createOscillator(); const sg=ac.createGain();
  sub.type='sine'; sub.frequency.setValueAtTime(80+big*40, t); sub.frequency.exponentialRampToValueAtTime(25, t+0.4);
  sg.gain.setValueAtTime(0, t); sg.gain.linearRampToValueAtTime(0.8, t+0.01); sg.gain.exponentialRampToValueAtTime(0.001, t+0.5);
  sub.connect(sg); sg.connect(ac.destination); sub.start(t); sub.stop(t+0.8);
}
function playBounce() { const ac=getAudioCtx(); const t=ac.currentTime; const o=ac.createOscillator(); const g=ac.createGain(); o.type='triangle'; o.frequency.setValueAtTime(600, t); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1); o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.1); }
function playHit() { const ac=getAudioCtx(); const t=ac.currentTime; const o=ac.createOscillator(); const g=ac.createGain(); o.type='square'; o.frequency.value=220; g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1); o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.1); }
function playWin() { const ac=getAudioCtx(); const t=ac.currentTime; [523, 659, 784].forEach((f, i) => { const o=ac.createOscillator(); const g=ac.createGain(); o.frequency.value=f; g.gain.setValueAtTime(0, t+i*0.1); g.gain.linearRampToValueAtTime(0.3, t+i*0.1+0.05); g.gain.exponentialRampToValueAtTime(0.001, t+i*0.1+0.3); o.connect(g); g.connect(ac.destination); o.start(t+i*0.1); o.stop(t+i*0.1+0.4); }); }

const STRATA_COLORS = ['#3a5220', '#4a3a1a', '#5a3d22', '#6b4c30', '#7a5a3a', '#8c6a45'];
function drawSky() { ctx.fillStyle='#050e1a'; ctx.fillRect(0,0,W,H); }
function drawTerrain() {
  for (let s = STRATA_COLORS.length-1; s >= 0; s--) {
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let x=0; x<W; x++) ctx.lineTo(x, mudStrata[x][s]);
    ctx.lineTo(W, H); ctx.fillStyle = STRATA_COLORS[s]; ctx.fill();
  }
}

function drawTank(t,idx) {
  const rad = (t.angle * Math.PI) / 180; const facing = idx === 0 ? 1 : -1;
  ctx.save(); ctx.translate(t.x, t.y);
  ctx.fillStyle=t.color; ctx.beginPath(); ctx.roundRect(facing>0?8:-24, -20, 16, 14, 3); ctx.fill();
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(-24,-1,48,2);
  const RAIL_LEN = 28; const bx = Math.cos(rad) * RAIL_LEN, by = -Math.sin(rad) * RAIL_LEN;
  ctx.strokeStyle=t.wheelColor; ctx.lineWidth=5; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(facing>0?-8:8, -18); ctx.lineTo(facing>0?-8:8+bx, -18+by); ctx.stroke();
  ctx.restore();
}

let aimCache = { angle: null, power: null, wx: null, wy: null, wpn: null, dots: [] };
function recomputeAimDots() {
  const t = tanks[0]; if (aimCache.angle === t.angle && aimCache.power === holdPower) return;
  const rad = (t.angle * Math.PI) / 180; const spd = holdPower * 0.22;
  let x = t.x, y = t.y-18, vx = Math.cos(rad)*spd, vy = -Math.sin(rad)*spd;
  aimCache.dots = [];
  for(let i=0; i<100; i++) {
    vx+=wind; vy+=t.weapon.gravity*0.25; x+=vx; y+=vy;
    if(y>=terrainY(x)) { aimCache.dots.push({x,y,hit:true}); break; }
    if(i%4===0) aimCache.dots.push({x,y,hit:false});
  }
  aimCache.angle=t.angle; aimCache.power=holdPower;
}

function drawAimGuide() {
  if (currentPlayer!==0 || animating || !gameRunning) return;
  recomputeAimDots();
  aimCache.dots.forEach(d => { ctx.beginPath(); ctx.arc(d.x, d.y, d.hit?4:2, 0, Math.PI*2); ctx.fillStyle=d.hit?'orange':'white'; ctx.fill(); });
}

function loop() {
  ctx.clearRect(0,0,W,H); drawSky(); drawTerrain(); drawAimGuide();
  projectiles.forEach(p => { ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });
  tanks.forEach((t,i)=>drawTank(t,i));
  if(gameRunning&&animating) updateProjectiles();
  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{ if(gameRunning){ initCanvas(); tanks.forEach(t=>t.y=terrainY(t.x)); } });
</script>
